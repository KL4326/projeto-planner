<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TaskFlow - Planner T.I</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#2463eb", "accent-red": "#FF3D6F", "accent-yellow": "#FFDD00", "accent-green": "#00E676" },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block !important; }
        #page-login.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; background-color: #0f1115; }
        .status-strip { width: 4px; height: 100%; position: absolute; left: 0; top: 0; }
        .subtask-done { text-decoration: line-through; opacity: 0.4; }
    </style>
</head>
<body class="bg-[#f7f7f8] dark:bg-[#0f1115] font-display text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">

<header id="main-header" class="hidden sticky top-0 z-40 px-6 py-3 flex items-center justify-between border-b border-gray-200 dark:border-white/10 bg-white/90 dark:bg-[#1a1c22]/90 backdrop-blur-md shadow-sm">
    <div class="flex items-center gap-8 w-full max-w-[1440px] mx-auto">
        <div class="flex items-center gap-3 min-w-fit cursor-pointer" onclick="app.navigate('dashboard')">
            <div class="bg-primary p-1.5 rounded-lg"><span class="material-symbols-outlined text-white">dataset</span></div>
            <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">TaskFlow</h1>
        </div>
        
        <div class="flex-1 flex items-center gap-4">
            <div class="relative flex-1 max-w-md">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">search</span>
                <input id="search-input" class="w-full bg-gray-100 dark:bg-white/10 border-none rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary/50 text-gray-900 dark:text-white placeholder-gray-500" placeholder="Pesquisar tarefas..." type="text"/>
            </div>
            
            <div class="relative">
                <button id="notif-btn" class="p-2 rounded-lg bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 relative">
                    <span class="material-symbols-outlined text-[22px] text-gray-600 dark:text-gray-400">notifications</span>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 size-5 bg-red-600 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white dark:border-[#1a1c22]">0</span>
                </button>
                <div id="notif-menu" class="hidden absolute right-0 mt-3 w-80 bg-white dark:bg-[#1a1c22] border dark:border-white/10 rounded-xl shadow-2xl z-50 overflow-hidden text-left">
                    <div class="p-4 border-b dark:border-white/10 bg-gray-50 dark:bg-black/20 font-bold text-xs uppercase text-primary">Atividade da Equipa</div>
                    <div id="notif-list" class="max-h-96 overflow-y-auto custom-scrollbar divide-y dark:divide-white/5"></div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button class="p-2 rounded-lg bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10" onclick="app.toggleTheme()">
                <span class="material-symbols-outlined text-[20px] text-gray-700 dark:text-gray-300">dark_mode</span>
            </button>
            
            <div id="profile-trigger" class="flex items-center gap-3 ml-2 cursor-pointer relative p-1 rounded-xl hover:bg-gray-100 dark:hover:bg-white/5 transition-all">
                <div class="text-right hidden md:block">
                    <p id="user-display-name" class="text-xs font-bold leading-none text-gray-900 dark:text-white">Carregando...</p>
                    <p id="user-display-role" class="text-[10px] text-gray-500 dark:text-gray-400 leading-none mt-1">Colaborador</p>
                </div>
                <div id="header-avatar" class="h-10 w-10 rounded-full border-2 border-primary/50 overflow-hidden bg-primary text-white flex items-center justify-center font-bold bg-cover bg-center">...</div>
                
                <div id="profile-menu" class="hidden absolute right-0 top-full mt-2 w-48 bg-white dark:bg-[#1a1c22] border dark:border-white/10 rounded-xl shadow-2xl z-50 overflow-hidden">
                    <button onclick="app.navigate('perfil')" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 dark:hover:bg-white/5 flex items-center gap-2"><span class="material-symbols-outlined text-lg">person</span> Perfil</button>
                    <button onclick="app.signOut()" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-red-50 flex items-center gap-2"><span class="material-symbols-outlined text-lg">logout</span> Sair</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main id="main-content" class="max-w-[1440px] mx-auto p-6 relative z-0">
    <section id="page-login" class="page-section active">
        <div class="w-full max-w-md bg-white dark:bg-[#1a1c22] p-10 rounded-3xl shadow-2xl border dark:border-white/10 text-center">
            <span class="material-symbols-outlined text-6xl text-primary font-bold mb-4">layers</span>
            <h2 class="text-2xl font-black mb-8 dark:text-white uppercase tracking-tighter">Acessar o Planner</h2>
            <form id="login-form" class="flex flex-col gap-4 text-left">
                <input id="login-email" type="email" placeholder="E-mail corporativo" class="rounded-xl border-gray-300 dark:bg-white/5 p-4 dark:text-white outline-none focus:ring-2 focus:ring-primary" required>
                <input id="login-password" type="password" placeholder="Senha" class="rounded-xl border-gray-300 dark:bg-white/5 p-4 dark:text-white outline-none focus:ring-2 focus:ring-primary" required>
                <button type="submit" class="bg-primary text-white font-black py-4 rounded-2xl hover:bg-blue-600 shadow-lg uppercase text-sm tracking-widest transition-all mt-2">Entrar</button>
            </form>
        </div>
    </section>

    <section id="page-dashboard" class="page-section">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8" id="statsContainer"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 flex flex-col gap-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xl font-bold dark:text-white">Fluxo de Trabalho <span id="taskCount" class="text-gray-400 text-sm font-medium">(0)</span></h2>
                    <button onclick="app.navigate('nova-tarefa')" class="bg-primary text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:scale-105 transition-all shadow-lg shadow-primary/20"><span class="material-symbols-outlined text-[18px]">add</span> Nova Tarefa</button>
                </div>
                
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-white/10 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50/50 dark:bg-white/5 text-gray-500 dark:text-gray-400 text-[11px] uppercase tracking-widest font-bold">
                                <th class="px-6 py-4 w-12"></th>
                                <th class="px-6 py-4 min-w-[300px]">Tarefa</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">Equipa</th>
                                <th class="px-6 py-4 text-right">Prazo</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody" class="divide-y divide-gray-100 dark:divide-white/5"></tbody>
                    </table>
                </div>
            </div>

            <aside class="lg:col-span-4 flex flex-col gap-4">
                <h2 class="text-xl font-bold dark:text-white mb-2">Ranking Produtividade</h2>
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-white/10 shadow-sm p-6 space-y-6">
                    <div id="rankingContainer" class="space-y-6"></div>
                </div>
            </aside>
        </div>
    </section>

    <section id="page-nova-tarefa" class="page-section max-w-4xl mx-auto">
        <div class="bg-white dark:bg-[#1a1c22] rounded-3xl p-8 border dark:border-white/10 shadow-2xl">
            <h3 class="text-2xl font-black mb-8 dark:text-white flex items-center gap-3"><span class="material-symbols-outlined text-primary">add_task</span> Nova Tarefa</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                <div class="space-y-5">
                    <div><label class="text-[10px] font-bold uppercase text-gray-500 ml-1">Título do Projeto</label><input type="text" id="nova-titulo" class="w-full rounded-xl border-gray-200 dark:bg-white/5 p-4 dark:text-white focus:ring-primary"></div>
                    <div><label class="text-[10px] font-bold uppercase text-gray-500 ml-1">Descrição</label><textarea id="nova-desc" class="w-full h-40 rounded-xl border-gray-200 dark:bg-white/5 p-4 dark:text-white focus:ring-primary"></textarea></div>
                </div>
                <div class="space-y-5">
                    <div><label class="text-[10px] font-bold uppercase text-gray-500 ml-1">Responsáveis</label><div id="task-assignees-checkboxes" class="rounded-xl border border-gray-200 dark:bg-white/5 p-4 flex flex-col gap-2 max-h-40 overflow-y-auto custom-scrollbar"></div></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold uppercase text-gray-500">Prioridade</label><select id="nova-prio" class="w-full rounded-xl border-gray-200 dark:bg-white/5 dark:text-white"><option value="Alta">Alta</option><option value="Média" selected>Média</option><option value="Baixa">Baixa</option></select></div>
                        <div><label class="text-[10px] font-bold uppercase text-gray-500">Prazo Final</label><input type="date" id="nova-fim" class="w-full rounded-xl border-gray-200 dark:bg-white/5 dark:text-white"></div>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button onclick="app.navigate('dashboard')" class="flex-1 bg-gray-100 dark:bg-white/5 py-4 rounded-xl font-bold text-gray-500 uppercase text-xs">Cancelar</button>
                        <button onclick="app.criarTarefa()" class="flex-[2] bg-primary text-white py-4 rounded-xl font-black shadow-lg uppercase text-xs">Criar Tarefa</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="page-detalhes" class="page-section"><div id="details-view-content" class="max-w-6xl mx-auto flex flex-col gap-6"></div></section>

    <section id="page-perfil" class="page-section">
        <div class="max-w-2xl mx-auto bg-white dark:bg-[#1a1c22] p-10 rounded-3xl border dark:border-white/10 shadow-xl text-center">
            <div class="relative w-32 h-32 mx-auto mb-8">
                <div id="profile-page-avatar" class="w-full h-full rounded-full bg-primary text-white flex items-center justify-center text-4xl font-black bg-cover bg-center border-4 border-white dark:border-[#1a1c22] shadow-xl cursor-pointer" onclick="document.getElementById('photo-options').classList.toggle('hidden')"></div>
                <div id="photo-options" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-40 bg-white dark:bg-gray-800 rounded-xl shadow-2xl z-10 overflow-hidden text-left border dark:border-white/10">
                    <button onclick="document.getElementById('profile-upload').click(); document.getElementById('photo-options').classList.add('hidden')" class="w-full px-4 py-2 text-xs font-bold hover:bg-gray-50 dark:hover:bg-white/5 border-b dark:border-white/5">Alterar Imagem</button>
                    <button onclick="app.removeProfilePhoto()" class="w-full px-4 py-2 text-xs font-bold text-red-500 hover:bg-red-50">Remover</button>
                </div>
                <input type="file" id="profile-upload" class="hidden" accept="image/*">
            </div>
            <div class="flex flex-col gap-5 text-left">
                <div><label class="text-[10px] font-bold uppercase text-gray-500 ml-1">Nome Completo</label><input id="profile-name-input" type="text" class="w-full rounded-xl border-gray-200 dark:bg-white/5 p-4 dark:text-white"></div>
                <div><label class="text-[10px] font-bold uppercase text-gray-500 ml-1">Bio / Notas</label><textarea id="profile-bio-input" class="w-full rounded-xl border-gray-200 dark:bg-white/5 p-4 dark:text-white h-24"></textarea></div>
                <button onclick="app.handleSaveProfile()" class="bg-primary text-white py-4 rounded-xl font-black shadow-lg uppercase text-xs">Salvar Perfil</button>
            </div>
        </div>
    </section>
</main>

<div id="dynamic-modal-container"></div>
<div id="toast-container"></div>

<script type="module" src="script.js"></script>
</body>
</html>
