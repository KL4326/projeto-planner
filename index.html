<div id="modal-backdrop" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        
        <div id="modal-subtask-form" class="modal-box hidden bg-white dark:bg-slate-900 w-full max-w-xl rounded-2xl shadow-2xl p-6">
            <h3 id="subtask-form-title" class="text-xl font-black mb-6">Configurar Subtarefa</h3>
            <div class="flex flex-col gap-4">
                <input id="sub-title-inp" type="text" placeholder="Título *" class="rounded-xl border dark:border-slate-700 bg-transparent p-4 dark:text-white outline-none focus:ring-2 focus:ring-primary">
                <textarea id="sub-desc-inp" placeholder="Instruções..." class="rounded-xl border dark:border-slate-700 bg-transparent p-4 dark:text-white min-h-[100px] outline-none focus:ring-2 focus:ring-primary"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <select id="sub-priority-inp" class="rounded-xl border dark:border-slate-700 bg-transparent p-4 dark:text-white outline-none">
                        <option value="low">🟢 Baixa</option><option value="medium" selected>🟡 Média</option><option value="high">🟠 Alta</option><option value="urgent">🔴 Urgente</option>
                    </select>
                    <input id="sub-date-inp" type="date" class="rounded-xl border dark:border-slate-700 bg-transparent p-4 dark:text-white outline-none">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Responsáveis</label>
                    <div id="sub-assignees-checkboxes" class="rounded-xl border dark:border-slate-700 p-3 flex flex-col gap-2 max-h-[120px] overflow-y-auto custom-scrollbar"></div>
                </div>
                <div class="flex justify-end gap-3 mt-4">
                    <button onclick="app.closeModal()" class="px-6 py-2 font-bold text-slate-500">Cancelar</button>
                    <button id="submit-subtask-form" class="bg-primary text-white px-10 py-2 rounded-xl font-bold shadow-lg">Salvar</button>
                </div>
            </div>
        </div>

        <div id="modal-subtask-view" class="modal-box hidden bg-white dark:bg-slate-900 w-full max-w-4xl rounded-2xl shadow-2xl h-[85vh] overflow-hidden flex flex-col">
            <div id="subtask-view-content" class="flex flex-col md:flex-row flex-1 overflow-hidden">
                </div>
        </div>

        </div>
