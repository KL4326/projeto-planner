<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Logística - Tarefas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8", "background-dark": "#111621" }, fontFamily: { "display": ["Manrope", "sans-serif"] } } } }
    </script>
    <style>
        /* Estilos SPA para evitar o 'pisca' */
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        /* Regra mestre para centralizar o Login */
        #page-login.active { 
            display: flex !important; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .filter-btn.active { background-color: #2463eb !important; color: white !important; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-full">
    
    <header id="main-header" class="hidden flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 py-3 lg:px-20 sticky top-0 z-50 gap-4">
        <div class="flex items-center gap-2 text-primary shrink-0 cursor-pointer" onclick="app.navigate('dashboard')">
            <span class="material-symbols-outlined text-3xl font-bold">layers</span>
            <h2 class="text-slate-900 dark:text-white text-xl font-black hidden sm:block">Planner</h2>
        </div>

        <div class="flex-1 max-w-md mx-4">
            <div class="relative group">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input id="search-input" type="text" placeholder="Procurar tarefa..." class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white">
            </div>
        </div>

        <div class="flex items-center gap-4 shrink-0">
            <div class="relative">
                <div id="profile-btn" class="flex items-center gap-2 cursor-pointer p-1 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                    <div id="header-avatar" class="size-9 rounded-full border-2 border-primary/20 bg-primary text-white flex items-center justify-center font-bold bg-cover bg-center text-xs">...</div>
                    <span class="material-symbols-outlined text-slate-400">expand_more</span>
                </div>
                <div id="profile-menu" class="absolute right-0 mt-2 w-52 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl hidden overflow-hidden z-50">
                    <button class="w-full text-left flex items-center gap-3 px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700" onclick="app.navigate('perfil')"><span class="material-symbols-outlined text-lg">person</span> Editar perfil</button>
                    <button class="theme-toggle w-full text-left flex items-center gap-3 px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700"><span class="material-symbols-outlined text-lg">dark_mode</span> Alternar Tema</button>
                    <button id="header-reset-password" class="w-full text-left flex items-center gap-3 px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700"><span class="material-symbols-outlined text-lg">lock</span> Alterar senha</button>
                    <hr class="border-slate-200 dark:border-slate-700"/>
                    <button id="admin-menu-link" class="hidden w-full text-left items-center gap-3 px-4 py-3 text-sm text-primary font-bold hover:bg-slate-50 dark:hover:bg-slate-700" onclick="app.navigate('admin')"><span class="material-symbols-outlined text-lg">admin_panel_settings</span> Painel Admin</button>
                    <button id="logout-btn" class="w-full text-left flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-slate-50 dark:hover:bg-slate-700"><span class="material-symbols-outlined text-lg">logout</span> Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="page-login" class="page-section bg-slate-50 dark:bg-background-dark">
            <div class="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl border dark:border-slate-800 text-center">
                <span class="material-symbols-outlined text-6xl text-primary font-bold mb-4">layers</span>
                <h2 class="text-2xl font-black mb-2">TaskFlow</h2>
                <p class="text-slate-500 text-sm mb-8 font-medium">Aceda à sua área de trabalho</p>
                <form id="login-form" class="flex flex-col gap-4 text-left">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-slate-400 ml-1 uppercase">E-mail</label>
                        <input id="login-email" type="email" class="rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 p-3 outline-none focus:ring-2 focus:ring-primary dark:text-white" required>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-slate-400 ml-1 uppercase">Senha</label>
                        <input id="login-password" type="password" class="rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 p-3 outline-none focus:ring-2 focus:ring-primary dark:text-white" required>
                    </div>
                    <button type="submit" class="bg-primary text-white font-bold py-4 rounded-2xl hover:bg-primary/90 transition-all shadow-lg mt-2">Entrar no Sistema</button>
                </form>
            </div>
        </section>

        <section id="page-dashboard" class="page-section px-6 lg:px-20 py-8">
            </section>

        <section id="page-nova-tarefa" class="page-section px-6 lg:px-40 py-8"></section>
        <section id="page-detalhes" class="page-section px-6 lg:px-40 py-8"><div id="details-view-content"></div></section>
        <section id="page-perfil" class="page-section px-6 lg:px-40 py-8"></section>
        <section id="page-admin" class="page-section px-6 lg:px-20 py-8"></section>
    </main>

    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        </div>

    <script type="module" src="script.js"></script>
</body>
</html>
