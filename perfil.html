<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editar Perfil - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8", "background-dark": "#111621" }, fontFamily: { "display": ["Manrope", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <header class="flex items-center justify-between border-b dark:border-slate-800 bg-white dark:bg-background-dark px-6 py-4 lg:px-40 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 cursor-pointer hover:bg-slate-200"><span class="material-symbols-outlined">arrow_back</span></button>
            <h2 class="text-xl font-bold">O Meu Perfil</h2>
        </div>
    </header>
    <main class="px-6 lg:px-40 py-10 flex justify-center">
        <div class="w-full max-w-2xl bg-white dark:bg-slate-900 p-8 rounded-2xl border dark:border-slate-800 shadow-sm flex flex-col gap-8">
            <div class="flex flex-col items-center gap-4 pb-8 border-b dark:border-slate-800">
                <div id="profile-preview" class="size-24 rounded-full bg-primary/20 text-primary flex items-center justify-center text-3xl font-black bg-cover bg-center border-4 border-white dark:border-slate-800"></div>
                <h3 id="profile-display-name" class="text-2xl font-bold">...</h3>
                <p id="profile-display-email" class="text-slate-500 text-sm">...</p>
            </div>
            <div class="flex flex-col gap-5">
                <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Nome Completo</label><input id="profile-name" class="w-full rounded-lg border dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white" type="text"/></div>
                <div class="flex flex-col gap-2"><label class="text-sm font-semibold">URL da Foto</label><input id="profile-photo" class="w-full rounded-lg border dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white" type="url"/></div>
                <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Biografia / Cargo</label><textarea id="profile-bio" class="w-full rounded-lg border dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 outline-none min-h-[120px] text-slate-900 dark:text-white"></textarea></div>
            </div>
            <div class="flex justify-end pt-4 border-t dark:border-slate-800">
                <button id="save-profile-btn" class="bg-primary hover:bg-primary/90 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition-all cursor-pointer">Guardar Alterações</button>
            </div>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
