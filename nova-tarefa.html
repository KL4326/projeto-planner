<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nova Tarefa - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8", "background-dark": "#111621" }, fontFamily: { "display": ["Manrope", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
    <div class="relative flex h-auto min-h-screen w-full flex-col">
        <div class="layout-container flex h-full grow flex-col">
            <header class="flex items-center justify-between border-b border-solid border-slate-200 dark:border-slate-800 px-6 lg:px-40 py-4 bg-white dark:bg-background-dark sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 text-primary"><span class="material-symbols-outlined">assignment_add</span></div>
                    <h2 class="text-xl font-bold">Nova Tarefa</h2>
                </div>
                <div class="flex gap-3">
                    <button id="save-task-btn" class="flex items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold transition-all hover:bg-primary/90 cursor-pointer">Salvar Tarefa</button>
                    <button onclick="window.location.href='index.html'" class="flex items-center justify-center rounded-lg h-10 px-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200 cursor-pointer"><span class="material-symbols-outlined text-[20px]">close</span></button>
                </div>
            </header>
            <main class="flex flex-1 justify-center py-8 px-6">
                <div class="w-full max-w-[960px] flex flex-col gap-8">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 flex flex-col gap-6">
                            <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Título *</label><input id="task-title" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 outline-none focus:ring-2 focus:ring-primary text-slate-900 dark:text-white" type="text" required/></div>
                            <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Descrição</label><textarea id="task-desc" class="w-full min-h-[200px] rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 outline-none focus:ring-2 focus:ring-primary resize-y text-slate-900 dark:text-white"></textarea></div>
                        </div>
                        <div class="flex flex-col gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold">Responsáveis</label>
                                <select id="task-assignees" multiple class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-sm focus:ring-2 focus:ring-primary min-h-[120px] text-slate-900 dark:text-white"></select>
                            </div>
                            <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Setor *</label>
                                <select id="task-sector" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white">
                                    <option value="Logística">Logística</option><option value="Infraestrutura">Infraestrutura</option><option value="SI">SI</option><option value="Service Desk">Service Desk</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Prioridade</label>
                                <div class="flex flex-col gap-2">
                                    <label class="cursor-pointer"><input class="peer hidden" name="priority" type="radio" value="high"/><div class="p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 peer-checked:border-red-500 peer-checked:bg-red-500/10 transition-all text-sm font-medium">Alta</div></label>
                                    <label class="cursor-pointer"><input class="peer hidden" name="priority" type="radio" value="medium" checked/><div class="p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-sm font-medium">Média</div></label>
                                    <label class="cursor-pointer"><input class="peer hidden" name="priority" type="radio" value="low"/><div class="p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 peer-checked:border-yellow-500 peer-checked:bg-yellow-500/10 transition-all text-sm font-medium">Baixa</div></label>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2"><label class="text-sm font-semibold">Prazo</label><input id="task-date" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white" type="date"/></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
