<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Detalhes - TaskFlow</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8", "background-dark": "#111621" }, fontFamily: { "display": ["Manrope", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <div class="px-4 lg:px-40 flex flex-1 justify-center py-5">
                <div class="layout-content-container flex flex-col max-w-[960px] flex-1 gap-6">
                    
                    <header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-4 py-6">
                        <div class="flex items-center gap-4">
                            <button onclick="window.location.href='index.html'" class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 transition-colors cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700"><span class="material-symbols-outlined">arrow_back</span></button>
                            <h2 class="text-xl font-bold">Tarefa Detalhada</h2>
                        </div>
                        <div class="flex gap-3">
                            <button id="edit-task-btn" class="h-10 bg-slate-200 dark:bg-slate-800 px-4 rounded-lg font-bold text-sm cursor-pointer hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">Editar</button>
                            <button id="delete-task-btn" class="h-10 bg-red-500/10 text-red-600 px-4 rounded-lg font-bold text-sm cursor-pointer hover:bg-red-500/20 transition-all">Excluir</button>
                        </div>
                    </header>

                    <div class="p-6 bg-white dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div id="detail-tags" class="flex gap-2 mb-3"></div>
                        <h1 id="detail-title" class="text-2xl font-extrabold text-slate-900 dark:text-white">...</h1>
                        <p id="detail-desc" class="text-slate-500 mt-2 whitespace-pre-line text-sm"></p>
                        <div class="flex flex-wrap gap-4 mt-6 text-[11px] font-black uppercase text-slate-400">
                            <div class="flex items-center gap-1 text-primary"><span class="material-symbols-outlined text-sm">group</span><span id="detail-assignees">--</span></div>
                            <div class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">domain</span><span id="detail-sector">--</span></div>
                            <div class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">calendar_today</span><span id="detail-due-date">--</span></div>
                        </div>
                        <div class="mt-6 flex gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl w-fit border border-slate-200 dark:border-slate-700">
                            <select id="quick-status-select" class="bg-white dark:bg-slate-900 border-none rounded-lg text-sm px-3 font-bold text-primary outline-none">
                                <option value="Em aberto">Em aberto</option><option value="Em andamento">Em andamento</option><option value="Concluída">Concluída</option><option value="Cancelada">Cancelada</option>
                            </select>
                            <button id="quick-status-save" class="bg-primary text-white text-xs font-bold px-4 py-2 rounded-lg cursor-pointer hover:bg-primary/90 transition-all">Salvar Status</button>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold">Subtarefas Detalhadas</h2><span id="subtasks-progress" class="text-xs font-bold bg-primary/10 text-primary px-2 py-1 rounded-full">0/0</span></div>
                        <div id="subtasks-list" class="bg-white dark:bg-slate-900/50 rounded-xl border dark:border-slate-800 divide-y dark:divide-slate-800 overflow-hidden shadow-sm"></div>
                        <button id="open-subtask-modal" class="mt-4 w-full py-3 bg-primary text-white rounded-xl font-bold cursor-pointer hover:bg-primary/90 shadow-lg">Nova Subtarefa Detalhada</button>
                    </div>

                    <div class="flex flex-col bg-white dark:bg-slate-900/50 rounded-xl border dark:border-slate-800 h-[400px] shadow-sm">
                        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
                        <div class="p-4 border-t dark:border-slate-800 flex gap-2">
                            <input id="chat-input" class="flex-1 bg-slate-50 dark:bg-slate-800 rounded-xl px-4 text-sm outline-none text-slate-900 dark:text-slate-100" placeholder="Comentar (Enter)..."/>
                            <button id="send-chat-btn" class="bg-primary text-white size-10 rounded-lg flex items-center justify-center cursor-pointer transition-all"><span class="material-symbols-outlined">send</span></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center"><h3 class="text-xl font-bold">Editar Tarefa</h3><button id="close-edit-modal" class="text-slate-400 hover:text-red-500 cursor-pointer"><span class="material-symbols-outlined">close</span></button></div>
            <div class="p-6 overflow-y-auto flex flex-col gap-4">
                <input id="edit-title" class="w-full rounded-lg border dark:border-slate-700 bg-transparent px-4 py-3 outline-none text-slate-900 dark:text-white" type="text" placeholder="Título"/>
                <textarea id="edit-desc" class="w-full rounded-lg border dark:border-slate-700 bg-transparent px-4 py-3 outline-none min-h-[100px] text-slate-900 dark:text-white" placeholder="Descrição"></textarea>
                <div class="flex flex-col gap-1"><label class="text-[10px] font-black uppercase text-slate-400">Responsáveis (Segure Ctrl)</label><select id="edit-assignees" multiple class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 min-h-[100px] text-slate-900 dark:text-white"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="edit-sector" class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white"><option value="Logística">Logística</option><option value="Infraestrutura">Infraestrutura</option><option value="SI">SI</option><option value="Service Desk">Service Desk</option></select>
                    <select id="edit-priority" class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white"><option value="high">Alta</option><option value="medium">Média</option><option value="low">Baixa</option></select>
                </div>
                <input id="edit-date" class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 outline-none text-slate-900 dark:text-white" type="date"/>
            </div>
            <div class="p-6 border-t dark:border-slate-800 flex justify-end gap-3 bg-slate-50 dark:bg-slate-800/20"><button id="cancel-edit-btn" class="px-6 py-2 font-bold text-slate-500 cursor-pointer">Cancelar</button><button id="save-edit-btn" class="px-6 py-2 bg-primary text-white rounded-lg font-bold cursor-pointer">Salvar</button></div>
        </div>
    </div>

    <div id="subtask-modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[110] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center text-primary"><h3 id="subtask-modal-title" class="text-xl font-bold">Subtarefa</h3><button id="close-subtask-modal" class="text-slate-400 hover:text-red-500 cursor-pointer"><span class="material-symbols-outlined">close</span></button></div>
            <div class="p-6 overflow-y-auto flex flex-col gap-4">
                <input id="sub-title" class="w-full rounded-lg border dark:border-slate-700 bg-transparent px-4 py-3 outline-none text-slate-900 dark:text-white" type="text" placeholder="Título da Subtarefa *"/>
                <textarea id="sub-desc" class="w-full rounded-lg border dark:border-slate-700 bg-transparent px-4 py-3 outline-none min-h-[80px] text-slate-900 dark:text-white" placeholder="Descrição"></textarea>
                <select id="sub-assignees" multiple class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white min-h-[100px]"></select>
                <div class="grid grid-cols-2 gap-4">
                    <select id="sub-priority" class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white"><option value="low">Baixa</option><option value="medium">Média</option><option value="high">Alta</option></select>
                    <input id="sub-date" class="w-full rounded-lg border dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-white" type="date"/>
                </div>
            </div>
            <div class="p-6 border-t dark:border-slate-800 flex justify-end gap-3"><button id="cancel-subtask-btn" class="px-6 py-2 font-bold text-slate-500 cursor-pointer">Cancelar</button><button id="save-subtask-btn" class="px-6 py-2 bg-primary text-white rounded-lg font-bold cursor-pointer transition-all">Salvar</button></div>
        </div>
    </div>

    <div id="view-subtask-modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[120] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-800/30">
                <div class="flex flex-col"><h3 id="view-sub-title" class="text-xl font-black text-primary">...</h3><p id="view-sub-meta" class="text-xs text-slate-500 font-bold mt-1 uppercase"></p></div>
                <div class="flex gap-2">
                    <button id="edit-sub-trigger-btn" class="h-10 bg-slate-200 dark:bg-slate-700 px-4 rounded-lg font-bold text-xs cursor-pointer hover:bg-primary hover:text-white transition-all">Editar</button>
                    <button id="delete-sub-btn" class="h-10 bg-red-500/10 text-red-600 px-4 rounded-lg font-bold text-xs cursor-pointer hover:bg-red-500 hover:text-white transition-all">Excluir</button>
                    <button id="close-view-subtask" class="text-slate-400 hover:text-red-500 cursor-pointer p-2"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div class="w-full md:w-1/3 p-6 border-r dark:border-slate-800 overflow-y-auto flex flex-col gap-6">
                    <div><label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Descrição</label><p id="view-sub-desc" class="text-sm mt-1 italic text-slate-600 dark:text-slate-300 leading-relaxed"></p></div>
                    <div><label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Responsáveis</label><p id="view-sub-assignees-list" class="text-sm font-bold text-primary mt-1"></p></div>
                    <div><label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Prazo Final</label><p id="view-sub-date-val" class="text-sm font-bold text-slate-900 dark:text-white mt-1"></p></div>
                </div>
                <div class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-900/20">
                    <div id="sub-chat-container" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
                    <div class="p-4 border-t dark:border-slate-800 flex gap-2">
                        <input id="sub-chat-input" class="flex-1 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 text-sm outline-none text-slate-900 dark:text-slate-100" placeholder="Chat da subtarefa (Enter)..."/>
                        <button id="send-sub-chat-btn" class="bg-primary text-white size-10 rounded-lg flex items-center justify-center cursor-pointer transition-all"><span class="material-symbols-outlined">send</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
